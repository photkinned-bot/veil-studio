<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veil Studio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <header>
        <div class="logo">Veil Studio</div>

        <nav>
            <button>Project</button>
            <button>Layers +</button>
            <button>Settings</button>
        </nav>
    </header>


    <main>

        <section class="preview">
            <div class="preview-box">
                Preview
            </div>
        </section>


        <aside class="layers">

            <h2>Layers</h2>

            <button class="add-layer">
                Add Layer
            </button>

            <div class="layer">
                Layer 1
            </div>

        </aside>

    </main>


    <footer>

        <button>Undo</button>
        <button>Reset</button>
        <button>Export</button>

    </footer>

</div>


<script src="script.js"></script>

</body>
</html>
