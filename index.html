<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veil Studio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <header>
        <div class="logo">Veil Studio</div>

        <nav>
            <button>Project</button>
            <button>Layers +</button>
            <button>Settings</button>
        </nav>
    </header>


    <main>

        <section class="preview">
            <canvas id="textureCanvas" class="preview-box"></canvas>
        </section>


        <aside class="layers">

            <h2>Layers</h2>

            <button class="add-layer">
                Add Layer
            </button>

           <div class="layer">

    <div>
        Layer 1
    </div>

    <select class="algorithm" id="algorithmSelect">

    <option>
        Noise
    </option>

</select>

    <label>
        Scale
    </label>

    <input 
        type="range" 
        id="scaleSlider"
        min="5"
        max="60"
        value="20"
    >

               <label>
    Contrast
</label>

<input 
    type="range"
    id="contrastSlider"
    min="0"
    max="100"
    value="50"
>
               <button id="randomizeButton">
    Randomize
</button>

</div>

        </aside>

    </main>


    <footer>

        <button>Undo</button>
        <button>Reset</button>
        <button>Export</button>

    </footer>

</div>


<script src="script.js"></script>

</body>
</html>
